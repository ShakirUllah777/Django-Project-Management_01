{% extends "base.html" %}

{% block content %}

<h1>My Tasks</h1>

<table border="1" cellpadding="10">

<tr>

<th>Title</th>
<th>Status</th>
<th>Priority</th>
<th>Action</th>

</tr>

{% for task in tasks %}

<tr>

<td>{{ task.title }}</td>
<td>{{ task.status }}</td>
<td>{{ task.priority }}</td>

<td>

<a href="/tasks/{{task.id}}">Edit</a>

</td>

</tr>

{% endfor %}

</table>

{% endblock %}
